services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rizkiagustiawan-tech
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - LEPTOS_SITE_ROOT=site
      - LEPTOS_SITE_ADDR=0.0.0.0:3000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
