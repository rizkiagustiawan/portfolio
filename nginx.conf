# ============================================
# rizkiagustiawan.tech — Nginx Reverse Proxy
# ============================================

upstream leptos_backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name rizkiagustiawan.tech www.rizkiagustiawan.tech;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/wasm
        image/svg+xml;

    # WASM MIME type map
    types {
        application/wasm wasm;
        text/html html;
        text/css css;
        image/svg+xml svg;
    }

    # Immutable static asset caching for /pkg
    location /pkg/ {
        proxy_pass http://leptos_backend;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
    }

    # Static assets
    location /public/ {
        proxy_pass http://leptos_backend;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Application routes
    location / {
        proxy_pass http://leptos_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}
